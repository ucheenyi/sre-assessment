spec:
  template:
    spec:
      containers:
      - name: server
        env:
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "$(NODE_IP):4317"
        - name: OTEL_SERVICE_NAME
          value: "frontend"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "deployment.environment=assessment,service.version=1.0.0"
        - name: OTEL_PROPAGATORS
          value: "tracecontext,baggage"