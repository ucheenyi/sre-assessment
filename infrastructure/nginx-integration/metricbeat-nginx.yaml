apiVersion: v1
kind: ConfigMap
metadata:
  name: metricbeat-nginx-config
  namespace: monitoring
data:
  metricbeat.yml: |
    metricbeat.modules:
    - module: nginx
      metricsets: [stubstatus]
      period: 10s
      hosts: ["http://ingress-nginx-controller-metrics.ingress-nginx.svc:10254"]
    - module: prometheus
      period: 30s
      hosts: ["ingress-nginx-controller-metrics.ingress-nginx.svc:10254"]
      metrics_path: /metrics
      namespace: nginx_ingress
    output.elasticsearch:
      hosts: ["elasticsearch-master:9200"]
      username: elastic
      password: "YOUR_ES_PASSWORD"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metricbeat-nginx
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metricbeat-nginx
  template:
    metadata:
      labels:
        app: metricbeat-nginx
    spec:
      containers:
      - name: metricbeat
        image: docker.elastic.co/beats/metricbeat:8.13.0
        args: ["-c", "/etc/metricbeat/metricbeat.yml", "-e"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: config
          mountPath: /etc/metricbeat
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: metricbeat-nginx-config